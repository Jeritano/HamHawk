version: "3.9"
services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: supplywatch
      POSTGRES_PASSWORD: supplywatch
      POSTGRES_DB: supplywatch
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supplywatch -d supplywatch"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
